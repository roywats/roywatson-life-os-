/* ── HELPERS ────────────────────────────────────────────────── */
function toStr(d){if(!d)d=new Date();return d.toISOString().split("T")[0]}
function todayStr(){return toStr()}
function formatDisplay(ds){const d=new Date(ds+"T00:00:00");return d.toLocaleDateString("en-SG",{weekday:"short",day:"numeric",month:"short",year:"numeric"})}
function isToday(ds){return ds===todayStr()}
function getPast14(){const a=[];for(let i=0;i<14;i++){const d=new Date();d.setDate(d.getDate()-i);a.push(toStr(d))}return a}
function getRank(xp,ranks){for(let i=ranks.length-1;i>=0;i--)if(xp>=ranks[i].min)return ranks[i].r;return"E"}
function getCR(xp){for(let i=CR.length-1;i>=0;i--)if(xp>=CR[i].min)return CR[i].r;return"E"}
function rankProg(xp,ranks){
  let ci=0;for(let i=ranks.length-1;i>=0;i--){if(xp>=ranks[i].min){ci=i;break}}
  const cur=ranks[ci],next=ranks[ci+1];
  if(!next)return{pct:100,toNext:0,nextR:null};
  return{pct:Math.min(100,Math.round(((xp-cur.min)/(next.min-cur.min))*100)),toNext:next.min-xp,nextR:next.r};
}
function crProg(xp){
  let ci=0;for(let i=CR.length-1;i>=0;i--){if(xp>=CR[i].min){ci=i;break}}
  const cur=CR[ci],next=CR[ci+1];
  if(!next)return{pct:100,toNext:0,nextR:null};
  return{pct:Math.min(100,Math.round(((xp-cur.min)/(next.min-cur.min))*100)),toNext:next.min-xp,nextR:next.r};
}
function daysSince(d){if(!d)return 99;return Math.floor((Date.now()-new Date(d).getTime())/86400000)}
function decayStatus(days,sh){
  if(days<=2)return{lvl:0,label:null};
  if(days<=5)return{lvl:1,label:"⚠️ Frozen — no XP gains"};
  if(days<=7){if(sh>0)return{lvl:1,label:"🛡️ Shield active"};return{lvl:2,label:"🔴 5% XP Decay"}}
  if(sh>0)return{lvl:1,label:"🛡️ Shield active"};
  return{lvl:3,label:"💀 10% Decay + Rank Risk"};
}

}
function RankPortrait({rank,sz=120}){

function XPBar({xp,ranks,color,h=5}){

}
function CBar({xp,h=4}){
  const{pct}=crProg(xp);
  return <div style={{height:h,background:"#1E1E28",borderRadius:h,overflow:"hidden"}}><div style={{height:"100%",width:`${pct}%`,borderRadius:h,background:`linear-gradient(90deg,${P.teal3},${P.teal2})`,transition:"width .6s"}}/></div>
}
function Card({children,style={}}){return <div style={{background:P.surf,borderRadius:16,border:`1px solid ${P.bdr}`,padding:16,...style}}>{children}</div>}
function SL({children}){return <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:P.txt2,letterSpacing:2.5,marginBottom:11}}>{children}</div>}
function Tag({children,color=P.teal2,bg=P.teal3}){return <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:1,background:bg,color,border:`1px solid ${color}33`}}>{children}</span>}

function CheckinTab({onCheckin,checkinLog}){
  const past14=getPast14();
  const[selDate,setSelDate]=useState(todayStr());
  const[showPicker,setShowPicker]=useState(false);
  const[checked,setChecked]=useState({});
  const[mood,setMood]=useState(3);
  const[summary,setSummary]=useState("");
  const[grade,setGrade]=useState("NT");
  const[unlocked,setUnlocked]=useState({});
  const[submitted,setSubmitted]=useState(false);

  useEffect(()=>{
    const ex=checkinLog[selDate];
    if(ex){setChecked(ex.checked||{});setMood(ex.mood||3);setSummary(ex.summary||"");setGrade(ex.tradeGrade||"NT");setSubmitted(true)}
    else{setChecked({});setMood(3);setSummary("");setGrade("NT");setSubmitted(false)}
    setUnlocked({});
  },[selDate,checkinLog]);

  const sd=new Date(selDate+"T00:00:00");
  const dow=sd.getDay(),dom=sd.getDate();
  const isSun=dow===0,isMon=dow===1,isFirst=dom===1;
  const isBacklog=!isToday(selDate);

  function locked(freq){
    if(isBacklog)return false;
    if(freq==="daily")return false;
    if(freq==="weekly")return!(isSun||isMon||unlocked.weekly);
    if(freq==="monthly")return!(isFirst||unlocked.monthly);
    return false;
  }
  function toggle(id){setChecked(p=>({...p,[id]:!p[id]}))}
  function calcXP(){
    const map={};
    Object.entries(SCFG).forEach(([k,cfg])=>{
      let t=0;cfg.activities.forEach(a=>{if(checked[a.id])t+=a.xp});
      if(t>0)map[k]=t;
    });
    return map;
  }
  const xpMap=calcXP();
  const totalXP=Object.values(xpMap).reduce((a,b)=>a+b,0);
  function submit(){onCheckin(selDate,{checked,mood,summary,tradeGrade:grade,xpGained:calcXP(),date:selDate});setSubmitted(true)}

      {showPicker&&<div style={{background:P.surf2,borderRadius:12,border:`1px solid ${P.bdr}`,padding:12,marginTop:8}}>

            const dxp=hasLog?Object.values(checkinLog[d].xpGained||{}).reduce((a,b)=>a+b,0):0;
            return <button key={d} onClick={()=>{setSelDate(d);setShowPicker(false)}} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 12px",borderRadius:10,cursor:"pointer",textAlign:"left",background:isSel?P.teal3:"transparent",border:`1px solid ${isSel?P.teal:hasLog?"#1A3A2A":P.bdr}`,transition:"all .15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:36,textAlign:"center"}}>
                  <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:isSel?P.teal2:P.txt2}}>{dn.toUpperCase()}</div>
                  <div style={{fontSize:12,color:isSel?P.teal2:P.txt,fontWeight:500}}>{dm}</div>
                </div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {isTod&&<Tag color={P.teal2} bg={P.teal3}>TODAY</Tag>}
                  {hasLog&&!isTod&&<Tag color="#18A37D" bg="#0A2420">LOGGED</Tag>}

        <div style={{marginTop:10,paddingTop:10,borderTop:`1px solid ${P.bdr}`}}>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:P.txt2,letterSpacing:1.5,marginBottom:6}}>OLDER DATE</div>
          <input type="date" max={todayStr()} min="2026-01-01"
            onChange={e=>{if(e.target.value){setSelDate(e.target.value);setShowPicker(false)}}}
            style={{width:"100%",background:P.surf,border:`1px solid ${P.bdr}`,borderRadius:9,padding:"9px 12px",color:P.txt,fontSize:13,boxSizing:"border-box",colorScheme:"dark"}}/>
        </div>
      </div>}
    </div>

    {isBacklog&&<div style={{background:"#1A1A08",border:`1px solid ${P.warn}40`,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",gap:10,alignItems:"flex-start"}}>
      <span style={{fontSize:14,flexShrink:0}}>📅</span>
      <div>
        <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:P.warn,letterSpacing:1.5,marginBottom:2}}>BACKLOG MODE</div>
        <div style={{fontSize:11,color:"#B0A060",lineHeight:1.5}}>Logging for <strong style={{color:P.warn}}>{formatDisplay(selDate)}</strong>. All locks removed.</div>

    {submitted&&<div style={{background:"#0A2420",border:`1px solid ${P.teal}`,borderRadius:12,padding:"10px 16px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

/* ══ STATS ═══════════════════════════════════════════════════ */

        </div>
        <div style={{display:"flex",gap:8,marginBottom:12}}>

            <div key={l} style={{flex:1,background:P.surf2,borderRadius:8,padding:"7px 8px",textAlign:"center"}}>

              <div style={{fontFamily:"'DM Mono',monospace",fontSize:13,color:c,fontWeight:500,marginTop:2}}>{v}</div>

            <div style={{fontSize:11,color:decay.lvl>=3?P.danger:P.warn,lineHeight:1.3}}>{decay.label}</div>

              </div>

        {l:"Recovery Sprint",d:"After decay: 2× XP for 7 days on affected stat",c:P.gold},

        <div key={l} style={{display:"flex",gap:10,padding:"7px 0",borderTop:`1px solid ${P.bdr}50`}}>
          <div style={{width:3,borderRadius:2,background:c,flexShrink:0,alignSelf:"stretch"}}/>
          <div>
            <div style={{fontSize:11,color:P.txt3,fontFamily:"'DM Mono',monospace"}}>{l}</div>
            <div style={{fontSize:11,color:P.txt2}}>{d}</div>
          </div>
        </div>
      ))}
    </Card>
  </div>
}

/* ══ DESTINY ═════════════════════════════════════════════════ */
function DestinyTab({goals,onUpdateGoal}){
  const[editing,setEditing]=useState(null);
  const[draft,setDraft]=useState("");
  const[gateOpen,setGateOpen]=useState(false);
  const[just,setJust]=useState("");
  const[pending,setPending]=useState(null);
  function startEdit(g){setEditing(g.id);setDraft(g.text);setGateOpen(false);setJust("");setPending(null)}
  function requestSave(g){if(draft.trim()===g.text.trim()){setEditing(null);return}setPending({id:g.id,old:g.text,nw:draft});setGateOpen(true)}
  function confirmSave(){
    if(just.trim().length<20){alert("Justification too short — min 20 characters.");return}
    onUpdateGoal(pending.id,pending.nw);setEditing(null);setGateOpen(false);setJust("");setPending(null);
  }
  function cancel(){setEditing(null);setGateOpen(false);setJust("");setPending(null)}
  return <div style={{padding:"16px 16px 0",animation:"fadeIn .3s ease"}}>
    <div style={{background:`linear-gradient(160deg,#0A2420,${P.surf2})`,borderRadius:18,border:`1px solid ${P.teal3}`,padding:20,marginBottom:14,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:-30,right:-30,width:120,height:120,borderRadius:"50%",background:P.teal,opacity:.07}}/>
      <SL>2026 NORTH STAR</SL>
      <p style={{fontFamily:"Georgia,serif",fontSize:13,color:P.txt,lineHeight:1.85,fontStyle:"italic"}}>"{NORTH_STAR}"</p>
      <div style={{display:"flex",gap:8,marginTop:14,flexWrap:"wrap"}}>
        {["🏠 Home","💙 Love","💰 Foundation"].map(t=><Tag key={t} color={P.teal2} bg={P.teal3}>{t}</Tag>)}
      </div>
    </div>
    <div style={{background:"#180A2E",borderRadius:14,border:"1px solid #3A1A5A",padding:"14px 16px",marginBottom:14}}>
      <SL>🔮 COSMIC WATCH · 2026</SL>
      <p style={{fontSize:12,color:"#C0A8E0",lineHeight:1.65}}>Wu self-penalty peaks <strong style={{color:P.purple}}>June 2026</strong> — if nothing feels like it's moving, hold the line. Your roots are growing even when you can't see them.</p>
    </div>
    <SL>2026 YEARLY GOALS</SL>
    {goals.map(goal=>{
      const col=GOAL_COLORS[goal.cat]||P.teal2,isEdit=editing===goal.id;
      return <Card key={goal.id} style={{marginBottom:10}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
          <div style={{flex:1}}>
            <span style={{display:"inline-block",padding:"2px 9px",borderRadius:20,fontSize:9,fontFamily:"'DM Mono',monospace",letterSpacing:1.5,background:`${col}18`,color:col,border:`1px solid ${col}30`,marginBottom:6}}>{goal.cat}</span>
            {isEdit
              ?<textarea value={draft} onChange={e=>setDraft(e.target.value)} style={{width:"100%",background:P.surf2,border:`1px solid ${P.bdr}`,borderRadius:9,padding:"9px 10px",color:P.txt,fontSize:12,fontFamily:"inherit",resize:"vertical",minHeight:64,boxSizing:"border-box"}}/>
              :<p style={{fontSize:12,color:P.txt3,lineHeight:1.6}}>{goal.text}</p>
            }
          </div>
          {!isEdit&&<button onClick={()=>startEdit(goal)} style={{padding:"4px 8px",borderRadius:7,fontSize:10,cursor:"pointer",background:"transparent",border:`1px solid ${P.bdr}`,color:P.txt2,flexShrink:0,marginTop:22}}>✎</button>}
        </div>
        {isEdit&&!gateOpen&&<div style={{display:"flex",gap:6,marginTop:10}}>
          <button onClick={()=>requestSave(goal)} style={{flex:1,padding:"9px",borderRadius:10,cursor:"pointer",background:P.teal3,border:`1px solid ${P.teal}`,color:P.teal2,fontFamily:"'DM Mono',monospace",fontSize:12}}>SAVE</button>
          <button onClick={cancel} style={{padding:"9px 14px",borderRadius:10,cursor:"pointer",background:"transparent",border:`1px solid ${P.bdr}`,color:P.txt2,fontSize:12}}>Cancel</button>
        </div>}
        {isEdit&&gateOpen&&<div style={{marginTop:10}}>
          <div style={{background:"#280E0E",borderRadius:10,border:`1px solid ${P.danger}40`,padding:"10px 12px",marginBottom:10}}>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:9,color:P.danger,letterSpacing:2,marginBottom:6}}>⚡ ACCOUNTABILITY GATE</div>
            <div style={{fontSize:11,color:"#C08080",lineHeight:1.5}}>Changing: <em style={{color:P.txt2}}>"{pending?.old}"</em><br/>Why does this serve your 2026 mission?</div>
          </div>
          <textarea value={just} onChange={e=>setJust(e.target.value)} placeholder="Justify this change (min 20 characters)..." style={{width:"100%",background:P.surf2,border:`1px solid ${P.bdr}`,borderRadius:9,padding:"9px 10px",color:P.txt,fontSize:12,fontFamily:"inherit",resize:"vertical",minHeight:60,boxSizing:"border-box",marginBottom:8}}/>
          <div style={{display:"flex",gap:6}}>
            <button onClick={confirmSave} style={{flex:1,padding:"9px",borderRadius:10,cursor:"pointer",background:"#280E0E",border:`1px solid ${P.danger}`,color:P.danger,fontFamily:"'DM Mono',monospace",fontSize:12}}>CONFIRM CHANGE</button>
            <button onClick={cancel} style={{padding:"9px 14px",borderRadius:10,cursor:"pointer",background:"transparent",border:`1px solid ${P.bdr}`,color:P.txt2,fontSize:12}}>Cancel</button>
          </div>
        </div>}
      </Card>
    })}
    <Card style={{marginBottom:24,marginTop:6}}>
      <SL>SEASON 1 MARKERS</SL>
      {[
        {l:"Three Trunks",    d:"Home, Love, Financial Foundation — every action feeds these three.",c:P.teal2},
        {l:"Growth Phase",    d:"Depth over production. Roots before canopy. Not in a hurry.",       c:P.teal2},
        {l:"Wu Self-Penalty", d:"June 2026 peak — hold the line when nothing moves.",                c:P.purple},
        {l:"Season 1 End",    d:"Jan 1, 2027 — annual reset with XP carry-forward applies.",         c:P.txt3},
        {l:"Carry-Forward",   d:"S→A(75k) · A→B(45k) · B→C(22k) · C→D(8k) · D→E(2k)",            c:P.gold},
        {l:"Decay Protection",d:"Side Quest XP, Life Quest XP, and earned Shields are never decayed.",c:P.blue},
      ].map(({l,d,c})=>(
        <div key={l} style={{padding:"9px 0",borderTop:`1px solid ${P.bdr}50`}}>
          <div style={{fontSize:12,color:c,fontFamily:"Georgia,serif",marginBottom:2}}>{l}</div>
          <div style={{fontSize:11,color:P.txt2,lineHeight:1.55}}>{d}</div>
        </div>
      ))}
    </Card>
  </div>
}

/* ══ MAIN APP ════════════════════════════════════════════════ */
const TABS=[{key:"home",label:"Home",icon:"⚔️"},{key:"checkin",label:"Check-in",icon:"✅"},{key:"stats",label:"Stats",icon:"📊"},{key:"quests",label:"Quests",icon:"📜"},{key:"destiny",label:"Destiny",icon:"🔮"}];

function App(){
  const[tab,setTab]=useState("home");
  const[loaded,setLoaded]=useState(false);
  const[stats,setStats]=useState({health:0,disc:0,wealth:0,clarity:0,intel:0});
  const[lifeXP,setLifeXP]=useState(0);
  const[sideQ,setSideQ]=useState(SQ_INIT);
  const[lifeQ,setLifeQ]=useState(LQ_INIT);
  const[goals,setGoals]=useState(GOALS_INIT);
  const[checkinLog,setCheckinLog]=useState({});
  const[streaks,setStreaks]=useState({});
  const[shields,setShields]=useState({});
  const[lastAct,setLastAct]=useState({});

  useEffect(()=>{
    const s=SS.get("stats:all");         if(s)  setStats(s);
    const lx=SS.get("lifexp");           if(lx!==null)setLifeXP(lx);
    const sq=SS.get("quests:side");      if(sq) setSideQ(sq);
    const lq=SS.get("quests:life");      if(lq) setLifeQ(lq);
    const g=SS.get("destiny:goals");     if(g)  setGoals(g);
    const cl=SS.get("checkin:log");      if(cl) setCheckinLog(cl);
    const st=SS.get("streaks:all");      if(st) setStreaks(st);
    const sh=SS.get("shields:all");      if(sh) setShields(sh);
    const la=SS.get("lastAct:all");      if(la) setLastAct(la);
    setLoaded(true);
  },[]);

  const handleCheckin=useCallback((dateStr,data)=>{
    setCheckinLog(prev=>{
      const oldXP=prev[dateStr]?.xpGained||{};
      const newXP=data.xpGained||{};
      const allKeys=new Set([...Object.keys(oldXP),...Object.keys(newXP)]);
      const delta={};
      allKeys.forEach(k=>{delta[k]=(newXP[k]||0)-(oldXP[k]||0)});
      setStats(sp=>{
        const next={...sp};
        Object.entries(delta).forEach(([k,v])=>{if(v!==0)next[k]=Math.max(0,(next[k]||0)+v)});
        SS.set("stats:all",next);return next;
      });
      setLastAct(lp=>{
        const next={...lp};
        Object.keys(newXP).forEach(k=>{next[k]=dateStr});
        SS.set("lastAct:all",next);return next;
      });
      const next={...prev,[dateStr]:data};
      SS.set("checkin:log",next);return next;
    });
  },[]);

  const addXP=useCallback((sk,amt)=>{
    setStats(prev=>{const next={...prev,[sk]:(prev[sk]||0)+amt};SS.set("stats:all",next);return next});
    setLastAct(prev=>{const next={...prev,[sk]:todayStr()};SS.set("lastAct:all",next);return next});
  },[]);

  const handleComplete=useCallback((type,qId,sk,xp)=>{
    if(type==="side"){
      setSideQ(prev=>{const next=prev.map(q=>q.id===qId?{...q,done:true}:q);SS.set("quests:side",next);return next});
      if(sk)addXP(sk,xp);
    }else{
      setLifeQ(prev=>{const next=prev.map(q=>q.id===qId?{...q,done:true}:q);SS.set("quests:life",next);return next});
      setLifeXP(prev=>{const next=prev+xp;SS.set("lifexp",next);return next});
    }
  },[addXP]);

  const handleUpdateGoal=useCallback((id,text)=>{
    setGoals(prev=>{const next=prev.map(g=>g.id===id?{...g,text}:g);SS.set("destiny:goals",next);return next});
  },[]);

  const totalStat=Object.values(stats).reduce((a,b)=>a+b,0);
  const sqXP=sideQ.filter(q=>q.done).reduce((a,q)=>a+q.xp,0);
  const composite=totalStat+lifeXP+sqXP;
  const cRank=getCR(composite);

  if(!loaded)return(
    <div style={{minHeight:"100vh",background:P.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <div style={{width:42,height:42,border:`2px solid ${P.teal3}`,borderTopColor:P.teal2,borderRadius:"50%",animation:"spin .9s linear infinite"}}/>
      <div style={{fontFamily:"'DM Mono',monospace",fontSize:10,color:P.txt2,letterSpacing:3}}>INITIALIZING</div>
      <div style={{fontSize:11,color:P.txt2}}>Roywatson Life OS · Season 1 · 2026</div>
    </div>
  );

  return(
    <div style={{maxWidth:430,margin:"0 auto",minHeight:"100vh",background:P.bg,display:"flex",flexDirection:"column",color:P.txt,overflowX:"hidden"}}>
      <div style={{background:P.hdr,borderBottom:`1px solid ${P.bdr}`,padding:"11px 16px 10px",position:"sticky",top:0,zIndex:100,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={{fontFamily:"Georgia,serif",fontSize:15,color:P.txt,lineHeight:1}}>Roywatson</div>
          <div style={{fontFamily:"'DM Mono',monospace",fontSize:8,color:P.txt2,letterSpacing:2,marginTop:2}}>LIFE OS · S1 · 2026</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{background:P.teal3,border:`1px solid ${P.teal}`,borderRadius:9,padding:"4px 12px"}}>
            <span style={{fontFamily:"'DM Mono',monospace",fontSize:11,color:P.teal2,fontWeight:500}}>{composite.toLocaleString()} XP</span>
          </div>
          <RankBadge rank={cRank} sz={33}/>
        </div>
      </div>
      <div style={{flex:1,overflowY:"auto"}}>
        {tab==="home"    &&<HomeTab    stats={stats} lifeXP={lifeXP} sideQuests={sideQ} checkinLog={checkinLog} streaks={streaks} shields={shields}/>}
        {tab==="checkin" &&<CheckinTab onCheckin={handleCheckin} checkinLog={checkinLog}/>}
        {tab==="stats"   &&<StatsTab   stats={stats} addXP={addXP} streaks={streaks} shields={shields} lastAct={lastAct}/>}
        {tab==="quests"  &&<QuestsTab  sideQuests={sideQ} lifeQuests={lifeQ} onComplete={handleComplete}/>}
        {tab==="destiny" &&<DestinyTab goals={goals} onUpdateGoal={handleUpdateGoal}/>}
      </div>
      <div style={{background:P.hdr,borderTop:`1px solid ${P.bdr}`,display:"flex",padding:"6px 0 10px",position:"sticky",bottom:0,zIndex:100}}>
        {TABS.map(({key,label,icon})=>{
          const active=tab===key;
          return <button key={key} onClick={()=>setTab(key)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4,background:"none",border:"none",cursor:"pointer",padding:"4px 0"}}>
            <div style={{width:38,height:38,borderRadius:11,display:"flex",alignItems:"center",justifyContent:"center",background:active?P.teal3:"transparent",border:active?`1px solid ${P.teal}`:"1px solid transparent",fontSize:17,transition:"all .18s",boxShadow:active?`0 0 14px ${P.teal}44`:"none"}}>{icon}</div>
            <span style={{fontSize:8,fontFamily:"'DM Mono',monospace",letterSpacing:.5,color:active?P.teal2:P.txt2}}>{label.toUpperCase()}</span>
          </button>
        })}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
